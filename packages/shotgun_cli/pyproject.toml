[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shotgun-cli"
version = "0.0.1"
description = "Generate App Store / Play Store screenshots for Flutter apps."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "shotgun contributors" }]
keywords = ["flutter", "screenshots", "app-store", "play-store", "mockup"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "pillow>=10.0",
    "pydantic>=2.5",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
shotgun = "shotgun_cli.cli:main"

[project.urls]
Homepage = "https://github.com/crazydumbbell/Shotgun"
Repository = "https://github.com/crazydumbbell/Shotgun"

[tool.setuptools.packages.find]
where = ["src"]
