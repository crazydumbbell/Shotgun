name: shotgun_runner
description: >-
  Capture App Store / Play Store screenshots of a Flutter app from
  `integration_test`. Pairs with the `shotgun` Python CLI that drives
  matrix iteration (device × locale × scene).
version: 0.1.0
homepage: https://github.com/crazydumbbell/Shotgun
repository: https://github.com/crazydumbbell/Shotgun
issue_tracker: https://github.com/crazydumbbell/Shotgun/issues
documentation: https://github.com/crazydumbbell/Shotgun/blob/main/README.md

topics:
  - screenshot
  - integration-test
  - app-store
  - localization
  - testing

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
